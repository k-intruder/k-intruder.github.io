<div class="page" id="s1"> <h1>1. 교수설계가이드 개요</h1> <h2>1.1 개발 목적</h2> <p>{{development_purpose}}</p> <h2>1.2 개발 배경</h2> <p>{{development_background_intro}}</p> <table><tbody> <tr><th style="width:30%;background:#f0f7ff">배경 요인</th><th>내용</th></tr> <tr><td><strong>🌐 디지털 대전환 가속화</strong></td><td>AI, 빅데이터, 클라우드 등 디지털 기술이 산업 전반에 급속히 확산되면서, 대학 교육도 이에 발맞춘 변화가 요구됩니다.</td></tr> <tr><td><strong>👩‍🎓 MZ세대 학습자 특성</strong></td><td>시각 매체와 즉각적 피드백을 선호하고, 상호작용적 학습 환경에 익숙한 MZ세대 학습자의 특성을 반영한 교수법이 필요합니다.</td></tr> <tr><td><strong>🎯 역량 중심 교육으로 전환</strong></td><td>단순 지식 습득에서 벗어나, AI 및 디지털 도구를 활용한 실무 역량 기반 학습으로의 전환을 도모합니다.</td></tr> <tr><td><strong>🏫 경민대학교 교육혁신</strong></td><td>경민대학교 SMART 교육방법론을 체계적으로 적용하여, 디지털 리터러시와 창의·융합 역량을 갖춘 인재 양성을 목표로 합니다.</td></tr> </tbody></table> <div class="box box-info" style="margin-top:10px"><strong>본 가이드의 핵심 목표</strong>: {{development_goal_summary}}</div> <h2>1.3 적용 교과목</h2> <p>본 가이드는 {{department}} {{year}} 전공선택 과목인 <strong>[{{course_name}}]</strong> 운영을 위해 작성되었습니다.</p> <table> <thead><tr><th>항목</th><th>내용</th></tr></thead> <tbody> <tr><td><strong>교과목명</strong></td><td>{{course_name}} ({{course_name_en}})</td></tr> <tr><td><strong>학과</strong></td><td>{{department}}</td></tr> <tr><td><strong>학기 / 학년</strong></td><td>{{semester}} / {{year}}</td></tr> <!-- <!-- <tr><td><strong>담당교수</strong></td><td>{{professor_name}}</td></tr> --> --> <tr><td><strong>주교재</strong></td><td>{{textbook}}</td></tr> </tbody> </table> <div class="footer"></div>

<div class="page" id="s3"> <h1>3. AI·DX 기반 교육의 이해</h1> <h2>3.1 교육 이해 및 적용 방향</h2> <p>{{ai_dx_understanding}}</p> <div class="box box-info"><strong>DX의 3단계 발전</strong><ol><li><strong>Digitization:</strong> 아날로그 자료의 디지털 변환</li><li><strong>Digitalization:</strong> 업무 프로세스의 자동화</li><li><strong>Digital Transformation:</strong> 새로운 가치 창출 및 교육 모델 혁신</li></ol></div> <h2>3.2 DX 기반 교육의 특징</h2> <table><tbody> <tr><th style="width:20%">특징</th><th>설명</th><th>기대 효과</th></tr> <tr><td><strong>개인화</strong></td><td>AI 맞춤형 학습 경로 제시</td><td>학습 격차 해소</td></tr> <tr><td><strong>데이터 기반</strong></td><td>학습 데이터 분석 및 피드백</td><td>객관적 성취도 파악</td></tr> <tr><td><strong>연결성</strong></td><td>클라우드·협업 툴 활용</td><td>협업 능력 강화</td></tr> <tr><td><strong>실재감</strong></td><td>VR/AR 몰입형 체험</td><td>학습 흥미 유발</td></tr> </tbody></table> <h2>3.3 핵심 디지털 기술</h2> <table><thead><tr><th style="width:20%">기술 영역</th><th style="width:25%">대표 도구</th><th style="width:30%">교육적 활용</th><th style="width:25%">기대 효과</th></tr></thead><tbody> <tr><td><strong>🤖 생성형 AI</strong></td><td>ChatGPT, Claude, Gemini</td><td>코드 생성·디버깅 지원, 질의응답, 보고서 초안 작성</td><td>자기주도 학습 강화, 즉각 피드백</td></tr> <tr><td><strong>💻 AI 코딩 보조</strong></td><td>GitHub Copilot, Cursor</td><td>실시간 코드 자동완성·제안, 오류 수정 가이드</td><td>코딩 진입장벽 완화, 생산성 향상</td></tr> <tr><td><strong>☁ 클라우드 IDE</strong></td><td>Replit, Google Colab</td><td>설치 없이 브라우저에서 실습, 공유·협업 코딩</td><td>환경 구성 시간 절감, 어디서나 학습</td></tr> <tr><td><strong> 협업·기록</strong></td><td>Notion, GitHub, Padlet</td><td>학습 포트폴리오 구축, 프로젝트 버전 관리</td><td>협업 역량 강화, 성장 과정 추적</td></tr> <tr><td><strong>🥽 VR·시뮬레이션</strong></td><td>Unity XR, Labster</td><td>알고리즘·자료구조 시각화, 가상 실험 환경 제공</td><td>추상 개념 이해도 향상, 몰입감 증대</td></tr> <tr><td><strong> 데이터 분석</strong></td><td>Python(Pandas), Tableau</td><td>실데이터 분석 실습, 시각화 프로젝트</td><td>데이터 리터러시 함양</td></tr> </tbody></table> <div class="box box-warn" style="margin-top:8px">⚠ <strong>디지털 도구 활용 시 유의사항</strong>: AI 도구 활용 결과물은 반드시 학습자 스스로 검토·수정하며, 출처 표기 및 저작권 준수를 원칙으로 합니다.</div> <div class="footer"></div>

<div class="page" id="s4"> <h1>4. AI·DX 교과목 수업 설계</h1> <h2 id="anchor-design-direction">4.1 수업 설계 방향</h2> <p>본 교과목은 <strong>경민대학교 SMART 교육방법론</strong>과 <strong>ADDIE 설계 모델</strong>을 결합하여, 학습자 중심의 DX 기반 수업을 구현합니다.</p> <table><thead><tr><th style="width:15%">설계 원칙</th><th style="width:40%">내용</th><th style="width:45%">실천 방안</th></tr></thead><tbody> <tr><td><strong>학습자 중심</strong></td><td>교수자 강의에서 학습자의 능동적 탐구·구성으로 전환</td><td>플립드러닝, 팀기반학습, 프로젝트 수업 적용</td></tr> <tr><td><strong>역량 기반</strong></td><td>지식 습득보다 실무 적용 역량(문제해결·협업·디지털) 강조</td><td>캡스톤디자인, PBL, 포트폴리오 평가</td></tr> <tr><td><strong>디지털 통합</strong></td><td>AI·클라우드·협업 도구를 수업 전 과정에 자연스럽게 통합</td><td>ChatGPT·Replit·Notion 기반 수업 운영</td></tr> <tr><td><strong>데이터 기반 피드백</strong></td><td>학습 데이터를 분석하여 개인화된 피드백·지원 제공</td><td>LMS 학습 이력 분석, AI 튜터 활용</td></tr> <tr><td><strong>현장 연계</strong></td><td>산업 현장의 실제 문제·사례를 수업에 반영</td><td>산업체 협업 프로젝트, 현장 전문가 특강</td></tr> </tbody></table> <div class="box box-info" style="margin-top:8px"><strong>경민대학교 SMART 교육방법</strong><ul style="margin-top:10px"> <li><strong>S (Sync):</strong> 블렌디드러닝, 플립드러닝, 소셜러닝</li> <li><strong>M (Mirroring):</strong> 캡스톤디자인, 산업체협업교육, 사례기반학습, 현장학습</li> <li><strong>A (Affiliation):</strong> 협동학습, 팀기반학습(TBL), 하브루타학습, 토론학습</li> <li><strong>R (Reinforcement):</strong> 문제중심학습(PBL), 자기주도학습, 실천학습(액션러닝), 게임기반학습, 포트폴리오</li> <li><strong>T (Tied-up):</strong> 팀티칭, 시뮬레이션기반학습(VR), 융합교육</li> </ul></div> <h2 id="anchor-smart-methods">4.2 학습활동 설계 원칙</h2> <table> <thead><tr><th style="width:25%">적용 교육방법</th><th style="width:35%">구체적 실행 전략</th><th style="width:40%">활용 도구 및 시기</th></tr></thead> <tbody>{{#each smart_methods}}<tr><td><strong>{{method_name}}</strong></td><td>{{{description}}}</td><td>{{tools}}</td></tr>{{/each}}</tbody> </table> <div class="box box-tip"><strong>선택된 교육방법의 통합 운영</strong><br>{{integration_summary}}</div> <h2 id="anchor-activity-design">4.3 DX 기반 학습활동 설계</h2> <p>DX 기반 수업에서는 온·오프라인 환경을 유기적으로 연계하며, 학습자가 디지털 도구를 통해 능동적으로 지식을 탐구·구성하도록 설계합니다.</p> <table><thead><tr><t   <div class="box box-info"><strong>생성형 AI 활용의 교육학적 3단계</strong><ol><li><strong>탐색(Exploration):</strong> 학습 주제와 관련된 개념, 사례, 쟁점을 질문으로 열어 보고 사전 이해를 형성합니다.</li><li><strong>구성(Construction):</strong> AI의 도움을 받아 초안을 만들되, 학습자는 전공 개념·자료·경험을 근거로 결과를 수정하고 재구성합니다.</li><li><strong>성찰(Reflection):</strong> 결과의 정확성·타당성·윤리성을 점검하고, 무엇을 수정했는지 자신의 언어로 설명하며 학습을 내면화합니다.</li></ol></div>

  <h1>4. 비개발 수업형 AI 활용 수업 설계</h1>
  <h2 id="anchor-design-direction">4.1 수업 설계 방향</h2>
  <p>본 교과목은 <strong>경민대학교 SMART 교육방법론</strong>과 <strong>ADDIE 설계 모델</strong>을 토대로, 비개발 전공 학습자도 생성형 AI를 의미 있게 활용할 수 있도록 설계합니다. 교수자는 AI를 즉답 제공자가 아니라 <strong>탐구를 촉진하는 비계</strong>로 활용하고, 학습자는 질문 생성·근거 확인·재구성·성찰의 순환을 통해 전공 맥락에 맞는 산출물을 완성하도록 지원합니다.</p>
  <table><thead><tr><th style="width:15%">설계 원칙</th><th style="width:40%">교육학적 의미</th><th style="width:45%">실천 방안</th></tr></thead><tbody>
    <tr><td><strong>접근성 기반 비계 제공</strong></td><td>도구 사용 자체가 학습 장벽이 되지 않도록 쉬운 진입 구조와 단계별 안내를 제공합니다.</td><td>회원가입, 기본 사용법, 프롬프트 예시, 대체 도구, 화면 캡처형 매뉴얼을 첫 주차에 안내합니다.</td></tr>
    <tr><td><strong>질문과 탐구 중심</strong></td><td>정답 생성보다 질문의 질과 재질문 과정을 통해 학습자의 사고를 확장합니다.</td><td>질문 프레임 제공, AI 응답 비교, 개선 프롬프트 작성, 근거 찾기 활동을 운영합니다.</td></tr>
    <tr><td><strong>실제 맥락과 전이</strong></td><td>전공 현장에서 만날 수 있는 실제 문제나 사례와 연결하여 학습의 전이 가능성을 높입니다.</td><td>학과 맞춤형 시나리오, 케이스 분석, 발표·토론·기획 과제를 설계합니다.</td></tr>
    <tr><td><strong>과정 중심 평가</strong></td><td>최종 산출물뿐 아니라 탐색·검토·수정·성찰의 과정을 함께 평가하여 학습의 질을 확인합니다.</td><td>AI 활용 기록표, 자기평가, 동료 피드백, 출처 표기, 수정 이력 루브릭을 적용합니다.</td></tr>
    <tr><td><strong>안전과 윤리</strong></td><td>기술 활용의 편의성보다 개인정보 보호, 저작권 준수, 검증 책임을 우선합니다.</td><td>수업 초반 윤리 가이드 배포, 예시 중심 안전교육, 오류 및 편향 사례 분석을 진행합니다.</td></tr>

  <div class="box box-info"><strong>경민대학교 SMART 교육방법</strong><ul style="margin-top:10px"> <li><strong>S (Sync):</strong> 블렌디드러닝, 플립드러닝, 소셜러닝</li> <li><strong>M (Mirroring):</strong> 캡스톤디자인, 산업체협업교육, 사례기반학습, 현장학습</li> <li><strong>A (Affiliation):</strong> 협동학습, 팀기반학습(TBL), 하브루타학습, 토론학습</li> <li><strong>R (Reinforcement):</strong> 문제중심학습(PBL), 자기주도학습, 실천학습(액션러닝), 게임기반학습, 포트폴리오</li> <li><strong>T (Tied-up):</strong> 팀티칭, 시뮬레이션기반학습(VR), 융합교육</li> </ul></div>

    <tr><td><strong>비교·검토</strong></td><td>AI 결과를 교과 개념, 참고문헌, 동료 의견과 비교하여 정확성과 타당성을 점검합니다.</td><td>NotebookLM, Google Docs, Padlet</td><td>수업 중</td></tr>
    <tr><td><strong>표현 확장</strong></td><td>시각자료, 카드뉴스, 포스터, 발표자료, 큐시트 등으로 결과를 재구성합니다.</td><td>Canva, 미리캔버스, CapCut</td><td>수업 후반</td></tr>

환경에 익숙한 MZ세대 학습자의 특성을 반영한 교수법이 필요합니다.</td></tr> <tr><td><strong>역량 중심 교육으로 전환</strong></td><td>단순 지식 습득에서 벗어나, AI 및 디지털 도구를 활용한 실무 역량 기반 학습으로의 전환을 도모합니다.</td></tr> <tr><td><strong> 경민대학교 교육혁신</strong></td><td>경민대학교 SMART 교육방법론을 체계적으로 적용하여, 디지털 리터러시와 창의·융합 역량을 갖춘 인재 양성을 목표로 합니다.</td></tr> </tbody></table> <div class="box box-info" style="margin-top:10px"> <strong>본 가이드의 핵심 목표</strong>: {{development_goal_summary}}</div> <h2>1.3 적용 교과목</h2> <p>본 가이드는 {{department}} {{year}} 전공선택 과목인 <strong>[{{course_name}}]</strong> 운영을 위해 작성되었습니다.</p> <table> <thead><tr><th>항목</th><th>내용</th></tr></thead> <tbody> <tr><td><strong>교과목명</strong></td><td>{{course_name}} ({{course_name_en}})</td></tr> <tr><td><strong>학과</strong></td><td>{{department}}</td></tr> <tr><td><strong>학기 / 학년</strong></td><td>{{semester}} / {{year}}</td></tr> <!-- <!-- <tr><td><strong>담당교수</strong></td><td>{{professor_name}}</td></tr> --> --> <tr><td><strong>주교재</strong></td><td>{{textbook}}</td></tr> </tbody> </table> <div class="footer"></div> </div> <div class="page" id="s2"> <h1>2. 교과목 개요</h1> <h2 id="anchor-course-spec">2.1 교과목 명세</h2> <table style="border:2px solid var(--primary-color)"> <tbody> <tr><th style="width:30%">교과목명</th><td>{{course_name}} ({{course_name_en}})</td></tr> <tr><th>이수구분 / 학점</th><td>{{course_type}} / {{credits}} (이론 {{theory_hours}} / 실습 {{practice_hours}})</td></tr> <tr><th>대상 학년</th><td>{{year}}</td></tr> <tr><th>NCS 직무분류</th><td>{{ncs_job}}</td></tr> <tr><th>핵심 역량</th><td>{{core_competency}}</td></tr> </tbody> </table> <h2 id="anchor-course-diff">2.2 DX 기반 수업의 차별점</h2> <table><thead><tr><th>구분</th><th>전통적 수업</th><th>DX 기반 수업</th></tr></thead><tbody> <tr><td><strong>학습 환경</strong></td><td>오프라인 강의실 중심</td><td>온·오프라인 블렌디드 환경</td></tr> <tr><td><strong>교수 방식</strong></td><td>교수자 중심 강의식</td><td>학습자 중심 참여·탐구형</td></tr> <tr><td><strong>도구 활용</strong></td><td>교재·판서 중심</td><td>AI·Cloud·협업 도구 통합 활용</td></tr> <tr><td><strong>피드백</strong></td><td>시험·과제 결과 중심</td><td>실시간·즉각적 AI 피드백</td></tr> <tr><td><strong>평가</strong></td><td>결과 중심 총괄평가</td><td>과정 중심 포트폴리오 평가</td></tr> <tr><td><strong>협업</strong></td><td>개인 학습 위주</td><td>디지털 협업 도구 활용 팀 프로젝트</td></tr> <tr><td><strong>콘텐츠</strong></td><td>정형화된 교재 중심</td><td>실시간 업데이트되는 오픈 자원 활용</td></tr> </tbody></table> <div class="box box-tip" style="margin-top:8px">⭐ DX 기반 수업은 <strong>SMART 교육방법</strong>(Sync·Mirroring·Affiliation·Reinforcement·Tied-up)을 토대로 학습자가 능동적으로 지식을 구성하고, 디지털 도구로 역량을 강화하는 교육 패러다임입니다.</div> <h2 id="anchor-course-desc">2.3 교과목 특성</h2> <p>{{course_description}}</p> <h2 id="anchor-learning-goals">2.4 교과목 학습목표</h2> <ol style="background-color:#f9f9f9;padding:20px"> {{#each learning_goals}}<li style="margin-bottom:10px">{{this}}</li>{{/each}} </ol> <h2 id="anchor-prerequisite">2.5 선수 과목 및 연계성</h2> <p style="background-color:#f9f9f9;padding:15px"> <strong>[선수 과목]:</strong> {{prerequisite}}<br> <strong>[후속 연계 과목]:</strong> {{follow_up}} </p> <div class="footer"></div> </div> <div class="page" id="s3"> <h1>3. 디지털 전환(DX) 기반 교육의 이해</h1> <h2>3.1 디지털 전환(DX)의 개념</h2> <p>{{ai_dx_understanding}}</p> <div class="box box-info"><strong>DX의 3단계 발전</strong><ol><li><strong>Digitization:</strong> 아날로그 자료의 디지털 변환</li><li><strong>Digitalization:</strong> 업무 프로세스의 자동화</li><li><strong>Digital Transformation:</strong> 새로운 가치 창출 및 교육 모델 혁신</li></ol></div> <h2>3.2 DX 기반 교육의 특징</h2> <table><tbody> <tr><th style="width:20%">특징</th><th>설명</th><th>기대 효과</th></tr> <tr><td><strong>개인화</strong></td><td>AI 맞춤형 학습 경로 제시</td><td>학습 격차 해소</td></tr> <tr><td><strong>데이터 기반</strong></td><td>학습 데이터 분석 및 피드백</td><td>객관적 성취도 파악</td></tr> <tr><td><strong>연결성</strong></td><td>클라우드·협업 툴 활용</td><td>협업 능력 강화</td></tr> <tr><td><strong>실재감</strong></td><td>VR/AR 몰입형 체험</td><td>학습 흥미 유발</td></tr> </tbody></table> <h2>3.3 핵심 디지털 기술</h2> <table><thead><tr><th style="width:20%">기술 영역</th><th style="width:25%">대표 도구</th><th style="width:30%">교육적 활용</th><th style="width:25%">기대 효과</th></tr></thead><tbody> <tr><td><strong> 생성형 AI</strong></td><td>ChatGPT, Claude, Gemini</td><td>코드 생성·디버깅 지원, 질의응답, 보고서 초안 작성</td><td>자기주도 학습 강화, 즉각 피드백</td></tr> <tr><td><strong>AI 코딩 보조</strong></td><td>GitHub Copilot, Cursor</td><td>실시간 코드 자동완성·제안, 오류 수정 가이드</td><td>코딩 진입장벽 완화, 생산성 향상</td></tr> <tr><td><strong>️ 클라우드 IDE</strong></td><td>Replit, Google Colab</td><td>설치 없이 브라우저에서 실습, 공유·협업 코딩</td><td>환경 구성 시간 절감, 어디서나 학습</td></tr> <tr><td><strong>협업·기록</strong></td><td>Notion, GitHub, Padlet</td><td>학습 포트폴리오 구축, 프로젝트 버전 관리</td><td>협업 역량 강화, 성장 과정 추적</td></tr> <tr><td><strong>VR·시뮬레이션</strong></td><td>Unity XR, Labster</td><td>알고리즘·자료구조 시각화, 가상 실험 환경 제공</td><td>추상 개념 이해도 향상, 몰입감 증대</td></tr> <tr><td><strong>데이터 분석</strong></td><td>Python(Pandas), Tableau</td><td>실데이터 분석 실습, 시각화 프로젝트</td><td>데이터 리터러시 함양</td></tr> </tbody></table> <div class="box box-warn" style="margin-top:8px"><strong>디지털 도구 활용 시 유의사항</strong>: AI 도구 활용 결과물은 반드시 학습자 스스로 검토·수정하며, 출처 표기 및 저작권 준수를 원칙으로 합니다.</div> <div class="footer"></div> </div> <div class="page" id="s4"> <h1>4. DX 기반 수업 설계</h1> <h2 id="anchor-design-direction">4.1 수업 설계 방향</h2> <p>본 교과목은 <strong>경민대학교 SMART 교육방법론</strong>과 <strong>ADDIE 설계 모델</strong>을 결합하여, 학습자 중심의 DX 기반 수업을 구현합니다.</p> <table><thead><tr><th style="width:15%">설계 원칙</th><th style="width:40%">내용</th><th style="width:45%">실천 방안</th></tr></thead><tbody> <tr><td><strong>학습자 중심</strong></td><td>교수자 강의에서 학습자의 능동적 탐구·구성으로 전환</td><td>플립드러닝, 팀기반학습, 프로젝트 수업 적용</td></tr> <tr><td><strong>역량 기반</strong></td><td>지식 습득보다 실무 적용 역량(문제해결·협업·디지털) 강조</td><td>캡스톤디자인, PBL, 포트폴리오 평가</td></tr> <tr><td><strong>디지털 통합</strong></td><td>AI·클라우드·협업 도구를 수업 전 과정에 자연스럽게 통합</td><td>ChatGPT·Replit·Notion 기반 수업 운영</td></tr> <tr><td><strong>데이터 기반 피드백</strong></td><td>학습 데이터를 분석하여 개인화된 피드백·지원 제공</td><td>LMS 학습 이력 분석, AI 튜터 활용</td></tr> <tr><td><strong>현장 연계</strong></td><td>산업 현장의 실제 문제·사례를 수업에 반영</td><td>산업체 협업 프로젝트, 현장 전문가 특강</td></tr> </tbody></table> <div class="box box-info" style="margin-top:8px"><strong>경민대학교 SMART 교육방법</strong><ul style="margin-top:10px"> <li><strong>S (Sync):</strong> 블렌디드러닝, 플립드러닝, 소셜러닝</li> <li><strong>M (Mirroring):</strong> 캡스톤디자인, 산업체협업교육, 사례기반학습, 현장학습</li> <li><strong>A (Affiliation):</strong> 협동학습, 팀기반학습(TBL), 하브루타학습, 토론학습</li> <li><strong>R (Reinforcement):</strong> 문제중심학습(PBL), 자기주도학습, 실천학습(액션러닝), 게임기반학습, 포트폴리오</li> <li><strong>T (Tied-up):</strong> 팀티칭, 시뮬레이션기반학습(VR), 융합교육</li> </ul></div> <h2 id="anchor-smart-methods">4.2 SMART 교육방법 적용</h2> <table> <thead><tr><th style="width:25%">적용 교육방법</th><th style="width:35%">구체적 실행 전략</th><th style="width:40%">활용 도구 및 시기</th></tr></thead> <tbody>{{#each smart_methods}}<tr><td><strong>{{method_name}}</strong></td><td>{{{description}}}</td><td>{{tools}}</td></tr>{{/each}}</tbody> </table> <div class="box box-tip">⭐ <strong>선택된 교육방법의 통합 운영</strong><br>{{integration_summary}}</div> <h2 id="anchor-activity-design">4.3 DX 기반 학습활동 설계</h2> <p>DX 기반 수업에서는 온·오프라인 환경을 유기적으로 연계하며, 학습자가 디지털 도구를 통해 능동적으로 지식을 탐구·구성하도록 설계합니다.</p> <table><thead><tr><th style="width:20%">활동 유형</th><th style="width:35%">활동 내용</th><th style="width:25%">활용 도구</th><th style="width:20%">적용 시기</th></tr></thead><tbody> <tr><td><strong> 사전 학습</strong></td><td>강의 영상·자료를 사전 시청하고 핵심 개념을 정리 (플립드러닝)</td><td>LMS, YouTube, Notion</td><td>수업 전 주차</td></tr> <tr><td><strong> 탐구·실험</strong></td><td>Cloud IDE에서 직접 코드 실행·수정하며 개념 검증</td><td>Replit, Google Colab</td><td>수업 중</td></tr> <tr><td><strong> AI 협업</strong></td><td>ChatGPT·Copilot과 대화하며 코드 생성·디버깅 실습</td><td>ChatGPT, GitHub Copilot</td><td>수업 중·후</td></tr> <tr><td><strong> 팀 프로젝트</strong></td><td>팀별 실제 문제 해결 프로젝트 수행 (캡스톤, PBL)</td><td>GitHub, Notion, Padlet</td><td>중후반 주차</td></tr> <tr><td><strong> 성찰·기록</strong></td><td>학습 포트폴리오 작성 및 동료 피드백(Peer Review)</td><td>Notion, GitHub Pages</td><td>매 주차 후</td></tr> <tr><td><strong> 발표·공유</strong></td><td>프로젝트 결과물 발표 및 상호 피드백</td><td>Canva, Padlet, Zoom</td><td>기말 주차</td></tr> </tbody></table> <div class="box box-tip" style="margin-top:8px">⭐ <strong>온·오프라인 연계 설계 팁</strong>: 오프라인 수업에서 고차원 사고(분석·종합·평가)를, 온라인에서 기초 지식 습득·반복 연습을 담당하도록 역할을 분리하면 효과적입니다.</div> <h2 id="anchor-method-guides">4.4 교육방법 적용 가이드</h2> {{#each method_guides}} <h3>4.4.{{add @index 1}} {{method_name}}</h3> <p>{{{overview}}}</p> {{#if operation_steps}} <h4>운영 단계</h4> <table><tbody> <tr><th style="width:15%">단계</th><th style="width:35%">활동 내용</th><th style="width:25%">교수자 역할</th><th style="width:25%">디지털 도구</th></tr> {{#each operation_steps}}<tr><td><strong>{{step_name}}</strong></td><td>{{{activities}}}</td><td>{{instructor_role}}</td><td>{{tools}}</td></tr>{{/each}} </tbody></table> {{/if}} {{#if support_framework}} <h4>지원 체계</h4> <table><tbody> <tr><th style="width:25%">지원 요소</th><th style="width:40%">구체적 적용 방법</th><th style="width:35%">디지털 도구</th></tr> {{#each support_framework}}<tr><td><strong>{{element}}</strong></td><td>{{{methods}}}</td><td>{{tools}}</td></tr>{{/each}} </tbody></table> {{/if}} {{#if examples}}<h4>적용 사례</h4>{{{examples}}}{{/if}} {{/each}} <div class="footer"></div> </div> <div class="page" id="s5"> <h1>5. 디지털 도구 활용 수업 운영</h1> <h2 id="anchor-digital-tools">5.1 필수 디지털 도구 선정</h2> {{#each digital_tools}} <h3>5.1.{{add @index 1}} {{category}}</h3> <table style="border-left:5px solid {{color}}"><tbody> <tr><th>도구명</th><th>{{name}}</th></tr> <tr><th>특징</th><td>{{description}}</td></tr> <tr><th>활용법</th><td>{{{usage}}}</td></tr> </tbody></table> {{/each}} <div class="footer"></div> </div> <div class="page" id="s6"> <h1 id="anchor-weekly-plan">6. 주차별 수업 운영 계획</h1> <p>강의계획서를 바탕으로 디지털 도구 활용을 극대화한 주차별 운영 계획입니다.</p> {{#each weeks}} <h3> {{weekNum}}주차{{#if is_midterm}} (중간평가){{/if}}{{#if is_final}} (기말평가){{/if}}: {{topic}}</h3> <table style="border-left:3px solid {{#if is_midterm}}#e53e3e{{else}}var(--secondary-color){{/if}}"><tbody> <tr><th style="width:20%;background-color:{{#if is_midterm}}#fff0f0{{else}}#e6fffa{{/if}}">학습목표</th><td>{{goal}}</td></tr> <tr><th style="background-color:{{#if is_midterm}}#fff0f0{{else}}#e6fffa{{/if}}">학습 내용</th><td>{{content}}</td></tr> <tr><th style="background-color:{{#if is_midterm}}#fff0f0{{else}}#e6fffa{{/if}}">활용 도구</th><td>{{tools}}</td></tr> <tr><th style="background-color:{{#if is_midterm}}#fff0f0{{else}}#e6fffa{{/if}}">평가방법</th><td>{{assessment}}</td></tr> </tbody></table> {{/each}} <div class="footer"></div> </div> <div class="page" id="s7"> <h1 id="anchor-activity-guides">7. 학습활동 운영 방법</h1> {{#each activity_guides}} <h3>7.{{add @index 1}} {{method_name}}</h3> <table><tbody> <tr><th style="width:20%">단계</th><th style="width:40%">활동 내용</th><th style="width:40%">활용 도구</th></tr> <tr><td>{{step}}</td><td>{{{content}}}</td><td>{{tools}}</td></tr> </tbody></table> {{#if weekly_tasks}}<h4>주차별 적용</h4>{{{weekly_tasks}}}{{/if}} {{#if support_items}}<h4>학습 지원</h4>{{{support_items}}}{{/if}} {{/each}} {{#if collaboration_guide}}<h2 id="anchor-collaboration-guide">학습활동 운영 가이드</h2>{{{collaboration_guide}}}{{/if}} {{#if ethics_warning}}<div class="box box-warn"><strong>AI 활용 윤리 가이드라인</strong><br>{{{ethics_warning}}}</div>{{/if}} <div class="footer"></div> </div> <div class="page" id="s8"> <h1 id="anchor-evaluation">8. 학습평가 및 환류 계획 설계</h1> <h2 id="anchor-evaluation-system">8.1 평가 체계</h2> <table> <thead><tr><th>평가 항목</th><th>비율(%)</th><th>평가 내용</th><th>평가 도구</th></tr></thead> <tbody> <tr><td><strong>출석</strong></td><td>{{attendance_rate}}%</td><td>{{attendance_description}}</td><td>{{attendance_tool}}</td></tr> <tr><td><strong>중간고사</strong></td><td>{{midterm_rate}}%</td><td>{{midterm_description}}</td><td>{{midterm_tool}}</td></tr> <tr><td><strong>기말고사</strong></td><td>{{final_rate}}%</td><td>{{final_description}}</td><td>{{final_tool}}</td></tr> <tr><td><strong>과제/프로젝트</strong></td><td>{{assignment_rate}}%</td><td>{{assignment_description}}</td><td>{{assignment_tool}}</td></tr> </tbody> </table> <div class="footer"></div> </div> <div class="page" id="s9"> <h1>9. 교수자 운영 가이드</h1> {{#if instructor_guide}}<div class="box box-info">{{{instructor_guide}}}</div>{{/if}} <h2>9.1 수업 전 준비 체크리스트</h2> <table><tbody> <tr><th style="width:30%;background:#f0f7ff">점검 항목</th><th>세부 내용</th><th style="width:15%">담당</th></tr> <tr><td>실습 환경 점검</td><td>Replit/Google Colab 접속 확인, 예제 코드 사전 업로드, 공유 링크 테스트</td><td>교수자</td></tr> <tr><td>계정 생성 안내</td><td>1주차: ChatGPT·GitHub·Replit·Notion 계정 생성 가이드 배포</td><td>교수자</td></tr> <tr><td>예제 코드 준비</td><td>주차별 실습 코드 GitHub 저장소 업로드, 학생 Fork 안내</td><td>교수자</td></tr> <tr><td>AI 도구 사용 지침</td><td>ChatGPT 활용 범위·인용 규칙 안내문 배포</td><td>교수자</td></tr> <tr><td>백업 플랜 준비</td><td>인터넷 장애 대비 오프라인 실습 자료(USB) 준비</td><td>교수자</td></tr> <tr><td>평가 기준 공지</td><td>포트폴리오·동료평가 루브릭 사전 공유</td><td>교수자</td></tr> </tbody></table> <h2>9.2 수업 중 교수자 역할</h2> <table><tbody> <tr><th style="width:25%;background:#f0f7ff">역할</th><th>내용</th></tr> <tr><td><strong> 모니터링</strong></td><td>학습 진도·참여도를 실시간 관찰하고, 어려움을 겪는 학습자에게 즉각 지원</td></tr> <tr><td><strong>촉진자</strong></td><td>정답을 직접 제시하기보다 질문을 통해 학습자 스스로 문제를 해결하도록 유도</td></tr> <tr><td><strong>️ 윤리 가이드</strong></td><td>AI 도구 활용 시 학습자의 이해·창의성 기여 여부를 확인하고 적절한 활용 유도</td></tr> <tr><td><strong>데이터 분석</strong></td><td>LMS 학습 이력 및 Replit 코드 저장소를 통해 개인별 학습 현황 파악</td></tr> </tbody></table> <h2>9.3 수업 후 환류 체크리스트</h2> <ul> <li> 학습 결과물(코드·포트폴리오) 확인 및 개별 피드백 제공</li> <li> 다음 주차 수업 내용 연계 여부 재검토</li> <li> 어려움이 많았던 학습자에게 보충 자료 공유</li> <li>수업 운영 일지 기록 (학습 반응, 개선 사항)</li> </ul> <div class="footer"></div> </div> <div class="page" id="s10"> <h1>10. 수업 운영 시 유의사항</h1> <h2>10.1 디지털 격차 고려</h2> <table><tbody> <tr><th style="width:30%;background:#fff5f5">유의 사항</th><th>구체적 대응 방안</th></tr> <tr><td>기기·인터넷 환경 차이</td><td>학교 전산실·노트북 대여 제도 사전 안내, 클라우드 기반 도구(Replit·Colab) 우선 활용으로 로컬 설치 최소화</td></tr> <tr><td>디지털 도구 숙련도 차이</td><td>1~2주차 도구 사용법 집중 안내, 팀 구성 시 숙련자·미숙련자 혼합 배치</td></tr> <tr><td>언어·접근성 장벽</td><td>한국어 UI 우선 도구 선택, 시각 장애·이동 불편 학습자를 위한 대안 제공</td></tr> </tbody></table> <h2>10.2 AI 활용 윤리 및 저작권</h2> <div class="box box-warn"><strong>AI 활용 원칙</strong> <ul style="margin-top:8px"> <li>AI 도구(ChatGPT, Copilot 등)가 생성한 코드·텍스트는 <strong>반드시 학습자가 이해·검토·수정</strong>한 후 제출</li> <li>AI 생성 결과물 사용 시 출처 표기: 예) <em>"이 코드는 ChatGPT의 초안을 수정하여 작성"</em></li> <li>AI 전적 의존 제출물은 과제 미제출로 처리 (루브릭에 명시)</li> <li>개인정보·민감 데이터를 AI 도구에 입력 금지</li> </ul> </div> <h2>10.3 데이터 보안 및 개인정보 보호</h2> <table><tbody> <tr><th style="width:30%;background:#fff5f5">항목</th><th>지침</th></tr> <tr><td>학습 데이터 관리</td><td>LMS·GitHub에 저장된 학생 데이터는 수업 목적 외 활용 금지</td></tr> <tr><td>계정 보안</td><td>공용 PC 사용 후 반드시 로그아웃, 비밀번호 공유 금지</td></tr> <tr><td>저작물 보호</td><td>학생 포트폴리오·코드의 무단 배포 금지, 공개 공유 시 동의 필요</td></tr> </tbody></table> <h2>10.4 학습자 웰빙 및 상호작용</h2> <ul> <li>디지털 기기 과다 사용으로 인한 피로 예방: 수업 중 5분 휴식 권장</li> <li>온라인 소통 시 상호 존중 문화 형성 (Padlet·협업 도구 에티켓 안내)</li> <li>어려움을 겪는 학습자를 위한 오피스아워·온라인 질의응답 채널 운영</li> <li>학습 목표를 잃지 않도록 매 수업 목표를 시각적으로 제시</li> </ul> <div class="footer"></div> </div> <div class="page" id="s11"> <h1 id="anchor-appendix">11. 참고자료 및 부록</h1> {{#each appendix_sections}} <h2>11.{{add @index 1}} {{section_title}}</h2> {{{section_content}}} {{/each}} <div class="box box-info" style="margin-top:30px"> <strong>문서 정보</strong><br> 교과목: {{course_name}} | 학과: {{department}} | 학기: {{semester}} </div> <div class="footer"></div> </div> </body></html>

<div class="page" id="s4">
  <h1>4. 비개발 수업형 AI 활용 수업 설계</h1>
  <h2 id="anchor-design-direction">4.1 수업 설계 방향</h2>
  <p>본 교과목은 <strong>경민대학교 SMART 교육방법론</strong>과 <strong>ADDIE 설계 모델</strong>을 토대로, 비개발 전공 학습자도 생성형 AI를 의미 있게 활용할 수 있도록 설계합니다. 교수자는 AI를 즉답 제공자가 아니라 <strong>탐구를 촉진하는 비계</strong>로 활용하고, 학습자는 질문 생성·근거 확인·재구성·성찰의 순환을 통해 전공 맥락에 맞는 산출물을 완성하도록 지원합니다.</p>
  <table><thead><tr><th style="width:15%">설계 원칙</th><th style="width:40%">교육학적 의미</th><th style="width:45%">실천 방안</th></tr></thead><tbody>
    <tr><td><strong>접근성 기반 비계 제공</strong></td><td>도구 사용 자체가 학습 장벽이 되지 않도록 쉬운 진입 구조와 단계별 안내를 제공합니다.</td><td>회원가입, 기본 사용법, 프롬프트 예시, 대체 도구, 화면 캡처형 매뉴얼을 첫 주차에 안내합니다.</td></tr>
    <tr><td><strong>질문과 탐구 중심</strong></td><td>정답 생성보다 질문의 질과 재질문 과정을 통해 학습자의 사고를 확장합니다.</td><td>질문 프레임 제공, AI 응답 비교, 개선 프롬프트 작성, 근거 찾기 활동을 운영합니다.</td></tr>
    <tr><td><strong>실제 맥락과 전이</strong></td><td>전공 현장에서 만날 수 있는 실제 문제나 사례와 연결하여 학습의 전이 가능성을 높입니다.</td><td>학과 맞춤형 시나리오, 케이스 분석, 발표·토론·기획 과제를 설계합니다.</td></tr>
    <tr><td><strong>과정 중심 평가</strong></td><td>최종 산출물뿐 아니라 탐색·검토·수정·성찰의 과정을 함께 평가하여 학습의 질을 확인합니다.</td><td>AI 활용 기록표, 자기평가, 동료 피드백, 출처 표기, 수정 이력 루브릭을 적용합니다.</td></tr>
    <tr><td><strong>안전과 윤리</strong></td><td>기술 활용의 편의성보다 개인정보 보호, 저작권 준수, 검증 책임을 우선합니다.</td><td>수업 초반 윤리 가이드 배포, 예시 중심 안전교육, 오류 및 편향 사례 분석을 진행합니다.</td></tr>
  </tbody></table>
  <div class="box box-info"><strong>경민대학교 SMART 교육방법</strong><ul style="margin-top:10px"> <li><strong>S (Sync):</strong> 블렌디드러닝, 플립드러닝, 소셜러닝</li> <li><strong>M (Mirroring):</strong> 캡스톤디자인, 산업체협업교육, 사례기반학습, 현장학습</li> <li><strong>A (Affiliation):</strong> 협동학습, 팀기반학습(TBL), 하브루타학습, 토론학습</li> <li><strong>R (Reinforcement):</strong> 문제중심학습(PBL), 자기주도학습, 실천학습(액션러닝), 게임기반학습, 포트폴리오</li> <li><strong>T (Tied-up):</strong> 팀티칭, 시뮬레이션기반학습(VR), 융합교육</li> </ul></div>
  <h2 id="anchor-smart-methods">4.2 학습활동 설계 원칙</h2>
  <table>
