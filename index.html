<style>
/* ── Reset & Base ── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;background:#e8edf2;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ── Toolbar ── */
#toolbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#1a2233;color:#fff;height:52px;flex-shrink:0;}
#toolbar h1{font-size:15px;font-weight:700;color:#7eb8f7;margin-right:auto;white-space:nowrap;}
.tb-btn{padding:6px 14px;border:none;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;transition:background .2s;}
.tb-btn-save{background:#2563eb;color:#fff;}
.tb-btn-save:hover{background:#1d4ed8;}
.tb-btn-reset{background:#4b5563;color:#fff;}
.tb-btn-reset:hover{background:#374151;}
.save-status{font-size:11px;padding:4px 10px;border-radius:12px;background:#1e3a5f;color:#93c5fd;white-space:nowrap;}
.export-wrap{position:relative;}
.tb-btn-export{background:#059669;color:#fff;}
.tb-btn-export:hover{background:#047857;}
.tb-btn-json-dl{background:#7c3aed;color:#fff;}
.tb-btn-json-dl:hover{background:#6d28d9;}
.tb-btn-json-ul{background:#b45309;color:#fff;}
.tb-btn-json-ul:hover{background:#92400e;}
#export-menu{display:none;position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.18);min-width:210px;z-index:999;overflow:hidden;}
#export-menu button{display:flex;align-items:center;gap:8px;width:100%;padding:11px 16px;border:none;background:none;cursor:pointer;text-align:left;font-size:13px;color:#1f2937;transition:background .15s;}
#export-menu button:hover{background:#f0f7ff;color:#2563eb;}
#export-menu hr{margin:2px 0;border:none;border-top:1px solid #eee;}

/* ── Main Layout ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── Left Panel ── */
#left-panel{width:420px;min-width:320px;background:#fff;display:flex;flex-direction:column;border-right:1px solid #d1d5db;overflow:hidden;flex-shrink:0;}
#tabs{display:flex;flex-wrap:wrap;overflow-x:visible;background:#f1f5f9;flex-shrink:0;border-bottom:2px solid #e5e7eb;padding:4px 4px 0;gap:3px;}
.tab-btn{padding:7px 6px;border:none;border-radius:6px 6px 0 0;background:#e2e8f0;cursor:pointer;font-size:11.5px;font-weight:600;color:#6b7280;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;text-align:center;line-height:1.3;flex:1 1 55px;}
.tab-btn.active{color:#2563eb;border-bottom-color:#2563eb;background:#fff;box-shadow:0 -1px 3px rgba(37,99,235,.1);}
.tab-btn:hover:not(.active){color:#2563eb;background:#dbeafe;}
#form-area{flex:1;overflow-y:auto;padding:16px;}
#form-area::-webkit-scrollbar{width:5px;}
#form-area::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}

/* ── Form Elements ── */
.section-title{font-size:13px;font-weight:700;color:#1e40af;margin:16px 0 10px;padding-bottom:5px;border-bottom:2px solid #bfdbfe;display:flex;align-items:center;gap:6px;}
.section-title:first-child{margin-top:0;}
.form-row{margin-bottom:10px;}
.form-label{display:block;font-size:11px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.form-input,.form-select,.form-textarea{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:5px;font-size:13px;color:#1f2937;background:#fff;transition:border-color .2s,box-shadow .2s;font-family:inherit;}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.12);}
.form-textarea{resize:vertical;min-height:70px;line-height:1.5;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;}

/* ── Array Cards ── */
.array-section{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px;margin-bottom:12px;}
.array-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.array-label{font-size:12px;font-weight:700;color:#1e40af;}
.btn-add{padding:4px 10px;border:1px solid #2563eb;border-radius:4px;background:#eff6ff;color:#2563eb;cursor:pointer;font-size:12px;font-weight:600;transition:background .2s;}
.btn-add:hover{background:#dbeafe;}
.array-items{display:flex;flex-direction:column;gap:8px;}
.array-item{background:#fff;border:1px solid #e2e8f0;border-radius:6px;padding:10px;position:relative;}
.array-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.array-item-num{font-size:11px;font-weight:700;color:#6b7280;background:#f3f4f6;padding:2px 8px;border-radius:3px;}
.btn-del{padding:2px 8px;border:1px solid #fca5a5;border-radius:4px;background:#fff5f5;color:#dc2626;cursor:pointer;font-size:11px;font-weight:600;}
.btn-del:hover{background:#fee2e2;}
.nested-array{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:5px;padding:8px;margin-top:8px;}
.nested-label{font-size:11px;font-weight:700;color:#475569;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.nested-item{background:#fff;border:1px solid #e9ecef;border-radius:4px;padding:8px;margin-bottom:6px;}

/* ── Accordion (weeks) ── */
.accordion-item{border:1px solid #e2e8f0;border-radius:6px;margin-bottom:6px;overflow:hidden;}
.accordion-header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#f8fafc;cursor:pointer;font-size:12px;font-weight:600;color:#374151;user-select:none;}
.accordion-header:hover{background:#f1f5f9;}
.accordion-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#e2e8f0;color:#6b7280;}
.accordion-badge.midterm{background:#fee2e2;color:#dc2626;}
.accordion-badge.final{background:#dcfce7;color:#16a34a;}
.accordion-arrow{transition:transform .2s;color:#9ca3af;font-size:11px;}
.accordion-arrow.open{transform:rotate(180deg);}
.accordion-body{display:none;padding:10px 12px;background:#fff;border-top:1px solid #e2e8f0;}
.accordion-body.open{display:block;}

/* ── Rate Validator ── */
.rate-total{text-align:right;font-size:12px;font-weight:700;padding:6px 10px;border-radius:5px;margin-top:4px;}
.rate-ok{background:#dcfce7;color:#16a34a;}
.rate-warn{background:#fef9c3;color:#b45309;}

/* ── Right Panel / Preview ── */
#right-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#d1d5db;}
#preview-toolbar{display:flex;align-items:center;padding:6px 14px;background:#374151;color:#e5e7eb;font-size:12px;gap:10px;flex-shrink:0;}
#preview-toolbar span{font-weight:600;}
#preview-status{margin-left:auto;font-size:11px;padding:3px 8px;border-radius:10px;background:#4b5563;}
#preview-status.ok{background:#14532d;color:#86efac;}
#preview-status.err{background:#7f1d1d;color:#fca5a5;}
#preview-iframe{width:100%;flex:1;border:none;background:#fff;}

/* ── Toast ── */
.array-hint{font-size:12px;color:#0066cc;background:#e8f4fd;border-left:3px solid #0066cc;padding:6px 10px;margin:0 0 8px;border-radius:0 4px 4px 0;}
#toast-container{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999;pointer-events:none;}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.2);animation:slideIn .3s ease;pointer-events:auto;max-width:320px;}
.toast.success{background:#16a34a;}
.toast.error{background:#dc2626;}
.toast.info{background:#2563eb;}
@keyframes slideIn{from{transform:translateX(120%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes slideOut{from{transform:translateX(0);opacity:1;}to{transform:translateX(120%);opacity:0;}}
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div id="toolbar">
  <h1>📄 교수설계가이드 작성 툴</h1>
  <span id="save-status" class="save-status">● 저장됨</span>
  <button class="tb-btn tb-btn-save" onclick="App.saveNow()">💾 저장</button>
  <button class="tb-btn tb-btn-reset" onclick="App.resetAll()">🗑️ 초기화</button>
  <button class="tb-btn tb-btn-json-dl" onclick="App.exportJSON()" title="현재 데이터를 JSON 파일로 저장">⬇️ JSON 저장</button>
  <button class="tb-btn tb-btn-json-ul" onclick="App.importJSON()" title="JSON 파일을 불러와 폼에 채움">⬆️ JSON 불러오기</button>
  <input type="file" id="json-file-input" accept=".json" style="display:none" onchange="App._onJsonFileSelected(event)">
  <div class="export-wrap">
    <button class="tb-btn tb-btn-export" onclick="App.toggleExportMenu()">📤 내보내기 ▾</button>
    <div id="export-menu">
      <button onclick="App.exportPDF()">🖨️ &nbsp;PDF로 내보내기</button>
      <hr>
      <button onclick="App.exportHTML()">📄 &nbsp;HTML로 다운로드</button>
      <button onclick="App.exportDOCX()">📝 &nbsp;DOCX로 다운로드</button>
    </div>
  </div>
</div>

<!-- ── Main ── -->
<div id="main">
  <!-- Left Panel -->
  <div id="left-panel">
    <div id="tabs">
      <button class="tab-btn active" onclick="App.showTab(0,this)">📋 기본정보</button>
      <button class="tab-btn" onclick="App.showTab(1,this)">🎯 교과목 개요</button>
      <button class="tab-btn" onclick="App.showTab(2,this)">🧠 수업 설계</button>
      <button class="tab-btn" onclick="App.showTab(3,this)">🔧 디지털 도구</button>
      <button class="tab-btn" onclick="App.showTab(4,this)">📅 주차별 계획</button>
      <button class="tab-btn" onclick="App.showTab(5,this)">🎭 학습활동</button>
      <button class="tab-btn" onclick="App.showTab(6,this)">📊 평가 설계</button>
    </div>
    <div id="form-area"></div>
  </div>

  <!-- Right Panel -->
  <div id="right-panel">
    <div id="preview-toolbar">
      <span>🔍 실시간 미리보기</span>
      <span id="preview-status">대기 중</span>
    </div>
    <iframe id="preview-iframe" sandbox="allow-same-origin allow-scripts allow-popups"></iframe>
  </div>
</div>

<div id="toast-container"></div>

<!-- ── Handlebars template (stored in script tag, not parsed by browser) ── -->

<html lang="ko"><head>
<meta charset="UTF-8">
<title>{{course_name}} 교수설계가이드</title>

/*# sourceMappingURL=pico.min.css.map */
:root{--primary-color:#0066cc;--secondary-color:#00aa88;--text-color:#333;--font-main:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo',sans-serif;}
*{font-family:var(--font-main)!important;}
body{font-family:var(--font-main);color:var(--text-color);background:#f9f9f9;line-height:1.6;max-width:210mm;margin:0 auto;padding:0;box-sizing:border-box;}
.page{background:#fff;width:210mm;padding:18mm 18mm;margin:0 auto 20px;position:relative;page-break-after:always;box-sizing:border-box;}
h1,h2,h3,h4{color:#111;font-weight:700;margin-top:1.5em;margin-bottom:.5em;}
h1{font-size:24pt;color:var(--primary-color);border-bottom:3px solid var(--secondary-color);padding-bottom:10px;margin-top:0;}
h2{font-size:18pt;color:var(--primary-color);border-left:5px solid var(--secondary-color);padding-left:15px;margin-top:18px;margin-bottom:8px;}
h3{font-size:14pt;color:#444;border-bottom:1px solid #eee;padding-bottom:5px;margin-top:12px;margin-bottom:6px;}
h4{font-size:12pt;color:var(--secondary-color);margin-top:20px;}
p{font-size:10.5pt;text-align:justify;margin-bottom:5px;line-height:1.45;}
ul,ol{font-size:10.5pt;margin-bottom:8px;line-height:1.45;}
.cover-page{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;height:297mm;border:1px solid #ddd;}
.cover-title{font-size:36pt;font-weight:900;color:var(--primary-color);margin-bottom:20px;line-height:1.2;}
.cover-subtitle{font-size:18pt;color:#555;margin-bottom:100px;font-weight:500;}
.cover-info{margin-top:auto;margin-bottom:50px;font-size:14pt;color:#666;border-top:2px solid var(--secondary-color);padding-top:30px;width:80%;}
.toc-list{list-style:none;padding:0;}
.toc-list li{margin-bottom:12px;border-bottom:1px dashed #eee;padding-bottom:5px;}
.toc-list a{text-decoration:none;color:#333;display:flex;justify-content:space-between;font-size:12pt;font-weight:500;}
table{width:100%;border-collapse:collapse;margin:8px 0;font-size:9.5pt;line-height:1.3;}
th{background-color:#f0f7ff;color:var(--primary-color);font-weight:bold;border:1px solid #ccc;padding:5px 6px;text-align:center;}
td{border:1px solid #ccc;padding:5px 6px;vertical-align:top;}
tr:nth-child(even){background-color:#fbfbfb;}
.box{padding:8px;margin:8px 0;border-radius:4px;font-size:10pt;line-height:1.4;}
.box-info{background-color:#e8f4fd;border-left:4px solid var(--primary-color);}
.box-tip{background-color:#e6fffa;border-left:4px solid var(--secondary-color);}
.box-warn{background-color:#fff5f5;border-left:4px solid #e53e3e;}
.icon{margin-right:8px;font-style:normal;}
.footer{text-align:center;font-size:10pt;color:#999;margin-top:30px;padding-top:15px;border-top:1px solid #eee;height:20px;}
@media print{body{background:#fff;max-width:none;}.page{margin:0;box-shadow:none;page-break-after:always;}}
</style>
</head><body>
<div class="page cover-page">
  <div style="margin-top:100px"><div style="font-size:80pt;color:var(--secondary-color);margin-bottom:30px">🎓</div></div>
  <div class="cover-title">{{course_name}}<br>교수설계가이드</div>
  <div class="cover-subtitle">디지털 전환 기반 교육설계 매뉴얼</div>
  <div class="cover-info">
    <p><strong>발행일:</strong> {{publish_date}}</p>
    <p><strong>적용 교과목:</strong> {{course_name}} ({{department}})</p>
    <p><strong>핵심 키워드:</strong> {{keywords}}</p>
  </div>
</div>
<div class="page">
  <h1>목 차</h1>
  <ul class="toc-list" style="margin-top:30px">
    <li><a href="#s1"><span style="padding-left:20px">1. 교수학습지침서 개요</span></a></li>
    <li><a href="#s2"><span style="padding-left:20px">2. 교과목 개요</span></a></li>

<script>
// ════════════════════════════════════════════════════════════════════
//  App
// ════════════════════════════════════════════════════════════════════
const App = (function() {
  'use strict';

  // ── State ──────────────────────────────────────────────────────────
  const STORAGE_KEY = 'guide_tool_v2';
  let data = {};
  let compiled = null;
  let renderTimer = null;
  let saveTimer = null;
  let currentTab = 0;
  let blobUrl = null;
  let docxLib = null;

  // ── Handlebars Helpers ─────────────────────────────────────────────
  function registerHelpers() {
    Handlebars.registerHelper('add', (a, b) => (parseInt(a) || 0) + (parseInt(b) || 0));
    Handlebars.registerHelper('len', arr => arr ? arr.length : 0);
  }

  // ── Template compile ───────────────────────────────────────────────
  function compileTemplate() {
    try {
      const src = document.getElementById('doc-template').innerHTML;
      compiled = Handlebars.compile(src);
      return true;
    } catch(e) {
      console.error('Template compile error:', e);
      return false;
    }
  }

  // ── Collect data from DOM ──────────────────────────────────────────
  function collect() {
    const d = {};
    // simple fields
    document.querySelectorAll('[data-field]').forEach(el => {
      d[el.dataset.field] = el.value || '';
    });
    // arrays
    d.learning_goals = collectStringArray('learning_goals');
    d.smart_methods  = collectObjArray('smart_methods', ['method_name','description','tools']);
    d.method_guides  = collectMethodGuides();
    d.digital_tools  = collectObjArray('digital_tools', ['category','color','name','description','usage']);
    d.activity_guides= collectObjArray('activity_guides',['method_name','step','content','tools','weekly_tasks','support_items','additional_info']);
    d.appendix_sections = collectObjArray('appendix_sections',['section_title','section_content']);
    // weeks → array
    d.weeks = [];
    for (let i = 1; i <= 15; i++) {
      d.weeks.push({
        weekNum: i,
        topic:      d[`week_${i}_topic`]      || '',
        goal:       d[`week_${i}_goal`]       || '',
        content:    d[`week_${i}_content`]    || '',
        tools:      d[`week_${i}_tools`]      || '',
        assessment: d[`week_${i}_assessment`] || '',
        is_midterm: i === 8,
        is_final:   i === 15
      });
    }
    data = d;
    return d;
  }

  function collectStringArray(name) {
    return [...document.querySelectorAll(`[data-arr="${name}"] [data-item-field]`)]
      .map(el => el.value || '').filter(Boolean);
  }

  function collectObjArray(name, fields) {
    const items = document.querySelectorAll(`[data-arr="${name}"] .array-item`);
    return [...items].map(item => {
      const obj = {};
      fields.forEach(f => {
        const el = item.querySelector(`[data-item-field="${f}"]`);
        obj[f] = el ? el.value || '' : '';
      });
      return obj;
    });
  }

  function collectMethodGuides() {
    const items = document.querySelectorAll('[data-arr="method_guides"] .array-item');
    return [...items].map(item => {
      const obj = {
        method_name: item.querySelector('[data-item-field="method_name"]')?.value || '',
        overview:    item.querySelector('[data-item-field="overview"]')?.value || '',
        examples:    item.querySelector('[data-item-field="examples"]')?.value || '',
        operation_steps: [],
        support_framework: []
      };
      item.querySelectorAll('[data-nested="operation_steps"] .nested-item').forEach(ni => {
        obj.operation_steps.push({
          step_name:      ni.querySelector('[data-item-field="step_name"]')?.value || '',
          activities:     ni.querySelector('[data-item-field="activities"]')?.value || '',
          instructor_role:ni.querySelector('[data-item-field="instructor_role"]')?.value || '',
          tools:          ni.querySelector('[data-item-field="tools"]')?.value || ''
        });
      });
      item.querySelectorAll('[data-nested="support_framework"] .nested-item').forEach(ni => {
        obj.support_framework.push({
          element: ni.querySelector('[data-item-field="element"]')?.value || '',
          methods: ni.querySelector('[data-item-field="methods"]')?.value || '',
          tools:   ni.querySelector('[data-item-field="tools"]')?.value || ''
        });
      });
      return obj;
    });
  }

  // ── Render Preview ─────────────────────────────────────────────────
  function renderPreview() {
    if (!compiled) return;
    const d = collect();
    try {
      const html = compiled(d);
      if (blobUrl) URL.revokeObjectURL(blobUrl);
      const blob = new Blob([html], {type: 'text/html;charset=utf-8'});
      blobUrl = URL.createObjectURL(blob);
      const iframe = document.getElementById('preview-iframe');
      iframe.src = blobUrl;
      setPreviewStatus('ok', '✅ 렌더링 완료');
    } catch(e) {
      console.error('Render error:', e);
      setPreviewStatus('err', '❌ 렌더링 오류');
    }
  }

  function setPreviewStatus(cls, msg) {
    const el = document.getElementById('preview-status');
    el.className = cls;
    el.textContent = msg;
  }

  function scheduleRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(renderPreview, 300);
    setSaveStatus('saving');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { saveData(); setSaveStatus('saved'); }, 600);
  }

  // ── LocalStorage ───────────────────────────────────────────────────
  function saveData() {
    try {
      const snapshot = collect();
      localStorage.setItem(STORAGE_KEY, JSON.stringify({data: snapshot, savedAt: new Date().toISOString()}));
    } catch(e) { setSaveStatus('error'); }
  }

  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  function setSaveStatus(s) {
    const el = document.getElementById('save-status');
    if (s === 'saved')  { el.textContent = '● 저장됨';    el.style.color = '#86efac'; }
    if (s === 'saving') { el.textContent = '● 저장 중...'; el.style.color = '#fde68a'; }
    if (s === 'error')  { el.textContent = '● 저장 실패';  el.style.color = '#fca5a5'; }
  }

  // ── Toast ──────────────────────────────────────────────────────────
  function toast(msg, type='info', duration=2500) {
    const c = document.getElementById('toast-container');
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    c.appendChild(el);
    setTimeout(() => {
      el.style.animation = 'slideOut .3s ease forwards';
      setTimeout(() => el.remove(), 300);
    }, duration);
  }

  // ── Tab Forms ──────────────────────────────────────────────────────
  const TABS = [
    buildTab0, buildTab1, buildTab2, buildTab3, buildTab4, buildTab5, buildTab6
  ];

  function showTab(idx, btn) {
    currentTab = idx;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const area = document.getElementById('form-area');
    area.innerHTML = '';
    TABS[idx](area);
    restoreFieldsFromData(data);
    area.addEventListener('input', scheduleRender);
    area.addEventListener('change', scheduleRender);
  }

  // ── Restore fields from saved data ────────────────────────────────
  function restoreFieldsFromData(d) {
    if (!d) return;
    // simple fields
    document.querySelectorAll('[data-field]').forEach(el => {
      if (d[el.dataset.field] !== undefined) el.value = d[el.dataset.field];
    });
    // array: learning_goals
    if (d.learning_goals && d.learning_goals.length) {
      const wrap = document.querySelector('[data-arr="learning_goals"] .array-items');
      if (wrap) {
        wrap.innerHTML = '';
        d.learning_goals.forEach((v, i) => addStringItem(wrap, 'learning_goals', v));
      }
    }
    // array: smart_methods
    if (d.smart_methods && d.smart_methods.length) {
      const wrap = document.querySelector('[data-arr="smart_methods"] .array-items');
      if (wrap) {
        wrap.innerHTML = '';
        d.smart_methods.forEach(obj => addSmartMethod(wrap, obj));
      }
    }
    // array: method_guides
    if (d.method_guides && d.method_guides.length) {
      const wrap = document.querySelector('[data-arr="method_guides"] .array-items');
      if (wrap) {
        wrap.innerHTML = '';
        d.method_guides.forEach(obj => addMethodGuide(wrap, obj));
      }
    }
    // array: digital_tools
    if (d.digital_tools && d.digital_tools.length) {
      const wrap = document.querySelector('[data-arr="digital_tools"] .array-items');
      if (wrap) {
        wrap.innerHTML = '';

  // ── Field helper ──────────────────────────────────────────────────
  function field(label, fieldName, type='input', opts={}) {
    const tag = type === 'textarea' ? 'textarea' : type === 'select' ? 'select' : 'input';
    let inner = '';
    if (type === 'select') {
      inner = (opts.options||[]).map(o => `<option value="${o}">${o}</option>`).join('');
    }
    const cls = type === 'textarea' ? 'form-textarea' : type === 'select' ? 'form-select' : 'form-input';
    const extra = type === 'input' ? `type="${opts.inputType||'text'}"` : '';
    const rows = type === 'textarea' ? `rows="${opts.rows||3}"` : '';
    if (type === 'color') {
      return `<div class="form-row"><label class="form-label">${label}</label>
        <input type="color" class="form-input" data-field="${fieldName}" style="height:36px;padding:2px 4px;width:60px;"> </div>`;
    }
    return `<div class="form-row"><label class="form-label">${label}</label>
      <${tag} class="${cls}" data-field="${fieldName}" ${extra} ${rows}>${inner}</${tag}></div>`;
  }

  function itemField(label, fieldName, type='input', opts={}) {
    const tag = type === 'textarea' ? 'textarea' : 'input';
    const cls = type === 'textarea' ? 'form-textarea' : 'form-input';
    const extra = type === 'input' ? `type="${opts.inputType||'text'}"` : '';
    const rows = type === 'textarea' ? `rows="${opts.rows||2}"` : '';
    return `<div class="form-row"><label class="form-label">${label}</label>
      <${tag} class="${cls}" data-item-field="${fieldName}" ${extra} ${rows} placeholder="${opts.ph||''}" ></${tag}></div>`;
  }

    'M (Mirroring)': ['캡스톤디자인','산업체협업교육','사례기반학습','현장학습'],

  };

  function buildSmartSelect(fieldName, selectedVal='') {
    let opts = `<option value="">-- 교육방법 선택 --</option>`;
    Object.entries(SMART_OPTIONS).forEach(([group, items]) => {
      opts += `<optgroup label="${group}">`;
      items.forEach(item => {
        const sel = item === selectedVal ? ' selected' : '';
        opts += `<option value="${item}"${sel}>${item}</option>`;
      });
      opts += `</optgroup>`;
    });
    return `<div class="form-row"><label class="form-label">교육방법명 (SMART 분류)</label>
      <select class="form-select" data-item-field="${fieldName}">${opts}</select></div>`;
  }

  // ── Rate total ────────────────────────────────────────────────────
  function updateRateTotal() {
    const fields = ['attendance_rate','midterm_rate','final_rate','assignment_rate'];
    let total = 0;
    fields.forEach(f => {
      const el = document.querySelector(`[data-field="${f}"]`);
      if (el) total += parseInt(el.value)||0;
    });
    const el = document.getElementById('rate-total');
    if (!el) return;
    el.textContent = `합계: ${total}%`;
    el.className = `rate-total ${total===100 ? 'rate-ok' : 'rate-warn'}`;
    scheduleRender();
  }

  // ── Export functions ───────────────────────────────────────────────
  function getRenderedHtml() {
    if (!compiled) return '';
    try { return compiled(collect()); } catch(e) { return ''; }
  }

  function exportPDF() {
    hideExportMenu();
    const html = getRenderedHtml();
    if (!html) { toast('렌더링된 문서가 없습니다.','error'); return; }
    const win = window.open('','_blank','width=1000,height=800');
    win.document.write(html);
    win.document.close();
    win.onload = () => setTimeout(() => { win.focus(); win.print(); }, 600);
    toast('🖨️ 인쇄 창을 열었습니다. "PDF로 저장"을 선택하세요.','info',3000);
  }

  function exportHTML() {
    hideExportMenu();
    const html = getRenderedHtml();
    const name = (data.course_name||'교수설계가이드')+'_교수설계가이드.html';
    const blob = new Blob([html],{type:'text/html;charset=utf-8'});
    const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:name});
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    toast('📄 HTML 파일 다운로드 완료!','success');
  }

  async function exportDOCX() {
    hideExportMenu();
    if (typeof docx === 'undefined') {
      toast('📝 DOCX 라이브러리 로딩 중...','info',2000);
      await loadDocxLib();
    }
    if (typeof docx === 'undefined') { toast('DOCX 라이브러리 로드 실패','error'); return; }
    try {
      const d = collect();
      const {Document,Paragraph,TextRun,Table,TableRow,TableCell,
              HeadingLevel,AlignmentType,WidthType,Packer,ShadingType,convertInchesToTwip} = docx;

      const h = (text,level) => new Paragraph({text,heading:level,spacing:{before:300,after:150}});
      const p = (text,bold=false) => new Paragraph({children:[new TextRun({text:text||'',bold,size:21})],spacing:{after:100}});
      const li = (text) => new Paragraph({children:[new TextRun({text:text||'',size:21})],bullet:{level:0},spacing:{after:80}});
      const br = () => new Paragraph({text:''});
      function strip(html) { const t=document.createElement('div');t.innerHTML=html||'';return t.textContent||''; }

      const iRow=(label,value)=>new TableRow({children:[
        new TableCell({children:[p(label,true)],width:{size:30,type:WidthType.PERCENTAGE},shading:{type:ShadingType.CLEAR,fill:'E8F4FD'}}),
        new TableCell({children:[p(value)],width:{size:70,type:WidthType.PERCENTAGE}})]});
      const iTable=rows=>new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:rows.map(([l,v])=>iRow(l,v))});
      const dRow=cols=>new TableRow({children:cols.map(c=>new TableCell({children:[p(c)]}))});
      const dTable=(headers,rows)=>new Table({width:{size:100,type:WidthType.PERCENTAGE},rows:[
        new TableRow({tableHeader:true,children:headers.map(h=>new TableCell({children:[p(h,true)],shading:{type:ShadingType.CLEAR,fill:'F0F7FF'}}))}),...rows.map(dRow)]});

      const children=[];
      // Cover
      children.push(
        new Paragraph({children:[new TextRun({text:d.course_name||'',bold:true,size:56,color:'0066CC'})],alignment:AlignmentType.CENTER,spacing:{before:2000,after:400}}),
        new Paragraph({children:[new TextRun({text:'교수설계가이드',bold:true,size:48,color:'0066CC'})],alignment:AlignmentType.CENTER,spacing:{after:400}}),
        new Paragraph({children:[new TextRun({text:'디지털 전환 기반 교육설계 매뉴얼',size:30,color:'555555'})],alignment:AlignmentType.CENTER,spacing:{after:1200}}),
        p(`발행일: ${d.publish_date||''}`),p(`적용 교과목: ${d.course_name||''} (${d.department||''})`),p(`핵심 키워드: ${d.keywords||''}`),br(),
      );
      // S1
      children.push(h('1. 교수학습지침서 개요',HeadingLevel.HEADING_1),
        h('1.3 적용 교과목',HeadingLevel.HEADING_2),
        iTable([['교과목명',`${d.course_name||''} (${d.course_name_en||''})`],['학과',d.department||''],['학기/학년',`${d.semester||''} / ${d.year||''}`],['담당교수',d.professor_name||''],['주교재',d.textbook||'']]),br());
      // S2
      children.push(h('2. 교과목 개요',HeadingLevel.HEADING_1),h('2.1 교과목 명세',HeadingLevel.HEADING_2),
        iTable([['교과목명',`${d.course_name||''} (${d.course_name_en||''})`],['이수구분/학점',`${d.course_type||''} / ${d.credits||''} (이론${d.theory_hours||''} / 실습${d.practice_hours||''})`],['대상학년',d.year||''],['NCS직무',d.ncs_job||''],['핵심역량',d.core_competency||'']]),
        h('2.2 교과목 특성',HeadingLevel.HEADING_2),p(d.course_description),
        h('2.3 학습목표',HeadingLevel.HEADING_2)
      );
      (d.learning_goals||[]).forEach((g,i)=>children.push(p(`${i+1}. ${g}`)));
      children.push(h('2.4 선수/후속 과목',HeadingLevel.HEADING_2),p(`선수: ${d.prerequisite||''}`),p(`후속: ${d.follow_up||''}`),br());
      // S4
      children.push(h('4. DX 기반 수업 설계',HeadingLevel.HEADING_1));
      if((d.smart_methods||[]).length){
        children.push(h('4.2 SMART 교육방법',HeadingLevel.HEADING_2));
        children.push(dTable(['교육방법','실행전략','활용도구'],(d.smart_methods||[]).map(m=>[m.method_name||'',strip(m.description||''),m.tools||''])));
      }
      if(d.integration_summary) children.push(p(`통합운영: ${d.integration_summary}`));
      // ADDIE removed per user request
      // S5
      if((d.digital_tools||[]).length){
        children.push(h('5. 디지털 도구',HeadingLevel.HEADING_1));
        children.push(dTable(['카테고리','도구명','특징','활용법'],(d.digital_tools||[]).map(t=>[t.category||'',t.name||'',t.description||'',strip(t.usage||'')])));
        children.push(br());
      }
      // S6
      children.push(h('6. 주차별 수업 운영 계획',HeadingLevel.HEADING_1));
      const weekRows=(d.weeks||[]).map(w=>[`${w.weekNum}주차${w.is_midterm?' (중간)':w.is_final?' (기말)':''} : ${w.topic}`,w.goal,w.content,w.tools,w.assessment]);
      children.push(dTable(['주차/주제','학습목표','학습내용','활용도구','평가방법'],weekRows),br());
      // S8
      children.push(h('8. 학습평가',HeadingLevel.HEADING_1),
        dTable(['평가항목','비율','내용','도구'],[
          ['출석',`${d.attendance_rate||''}%`,d.attendance_description||'',d.attendance_tool||''],
          ['중간고사',`${d.midterm_rate||''}%`,d.midterm_description||'',d.midterm_tool||''],
          ['기말고사',`${d.final_rate||''}%`,d.final_description||'',d.final_tool||''],
          ['과제/프로젝트',`${d.assignment_rate||''}%`,d.assignment_description||'',d.assignment_tool||'']]),br());
      // S11
      if((d.appendix_sections||[]).length){
        children.push(h('11. 부록',HeadingLevel.HEADING_1));
        (d.appendix_sections||[]).forEach((s,i)=>{children.push(h(`11.${i+1} ${s.section_title||''}`,HeadingLevel.HEADING_2));children.push(p(strip(s.section_content||'')));}); 
      }

      const doc=new Document({
        creator:d.professor_name||'',title:`${d.course_name||''} 교수설계가이드`,
        sections:[{properties:{page:{margin:{top:convertInchesToTwip(1),right:convertInchesToTwip(1),bottom:convertInchesToTwip(1),left:convertInchesToTwip(1)}}},children}]
      });
      const blob=await Packer.toBlob(doc);
      const name=(d.course_name||'교수설계가이드')+'_교수설계가이드.docx';
      const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:name});
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
      toast('📝 DOCX 파일 다운로드 완료!','success');
    } catch(e) {
      console.error(e);
      toast('DOCX 생성 오류: '+e.message,'error',4000);
    }
  }

  function loadDocxLib() {
    return new Promise((resolve)=>{
      if(typeof docx!=='undefined'){resolve();return;}
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/docx@8/build/index.min.js';
      s.onload=resolve; s.onerror=resolve;
      document.head.appendChild(s);
    });
  }

  // ── Public methods ─────────────────────────────────────────────────
  function toggleExportMenu() {
    const m=document.getElementById('export-menu');
    m.style.display = m.style.display==='none'||!m.style.display ? 'block':'none';
  }
  function hideExportMenu() { document.getElementById('export-menu').style.display='none'; }

  document.addEventListener('click',e=>{ if(!e.target.closest('.export-wrap')) hideExportMenu(); });

  // ── _addItem dispatcher ───────────────────────────────────────────
  function _addItem(name) {
    const wrap = document.querySelector(`[data-arr="${name}"] .array-items`);
    if(!wrap) return;
    if(name==='learning_goals') addStringItem(wrap, name);
    else if(name==='smart_methods') addSmartMethod(wrap);
    else if(name==='method_guides') addMethodGuide(wrap);
    else if(name==='digital_tools') addDigitalTool(wrap);
    else if(name==='activity_guides') addActivityGuide(wrap);
    else if(name==='appendix_sections') addAppendix(wrap);
    scheduleRender();
  }

  function _addNestedStep(btn) {
    const container = btn.closest('[data-nested="operation_steps"]').querySelector('.nested-items');
    _addNestedStepToEl(container);
    scheduleRender();
  }
  function _addNestedSupport(btn) {
    const container = btn.closest('[data-nested="support_framework"]').querySelector('.nested-items');
    _addNestedSupportToEl(container);
    scheduleRender();
  }
  function _onChange() { scheduleRender(); }

  // ── Init ───────────────────────────────────────────────────────────
  function init() {
    registerHelpers();
    if (!compileTemplate()) {
      document.getElementById('preview-status').textContent = '❌ 템플릿 오류';
      return;
    }
    // load saved data
    const saved = loadData();
    if (saved && saved.data) {
      data = saved.data;
      const t = new Date(saved.savedAt);
      toast(`📂 저장된 데이터 복원 (${t.toLocaleString('ko-KR')})`, 'info', 3500);
    }
    // build first tab
    const area = document.getElementById('form-area');
    buildTab0(area);
    restoreFieldsFromData(data);
    area.addEventListener('input', scheduleRender);
    area.addEventListener('change', scheduleRender);
    // ★ 즉시 렌더링
    renderPreview();
    setSaveStatus('saved');
  }

  function saveNow() {
    saveData();
    setSaveStatus('saved');
    toast('✅ 저장 완료!','success');
  }

  function resetAll() {
    if (!confirm('모든 입력 데이터를 초기화할까요?')) return;
    localStorage.removeItem(STORAGE_KEY);
    data = {};
    showTab(0, document.querySelector('.tab-btn'));
    renderPreview();
    toast('🗑️ 초기화 완료','info');
  }

  // ── JSON Export ───────────────────────────────────────────────────
  function exportJSON() {
    const d = collect();
    // _meta 추가
    const output = {
      _meta: {
        version: '1.0',
        description: 'DX 기반 교수설계가이드 – 저장 데이터',
        saved_at: new Date().toISOString(),
        tool: 'DX 교수설계가이드 작성 도구'
      },
      ...d
    };
    const blob = new Blob([JSON.stringify(output, null, 2)], { type: 'application/json;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const courseName = (d.course_name || '교수설계가이드').replace(/[\\/:*?"<>|]/g, '_');
    const dateStr = new Date().toISOString().slice(0,10);
    a.href = url;
    a.download = `${courseName}_${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);
    toast('✅ JSON 저장 완료!', 'success');
  }

  function importJSON() {
    document.getElementById('json-file-input').value = ''; // reset so same file can re-trigger
    document.getElementById('json-file-input').click();
  }

  function _onJsonFileSelected(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const parsed = JSON.parse(e.target.result);
        // _meta 키 제거 후 data에 병합
        const { _meta, ...importedData } = parsed;
        // weeks 배열 → 평탄화 (week_N_topic 등 키로 변환)
        if (importedData.weeks && Array.isArray(importedData.weeks)) {
          importedData.weeks.forEach(w => {
            const n = w.weekNum;
            if (!n) return;
            importedData[`week_${n}_topic`]      = w.topic      || '';
            importedData[`week_${n}_goal`]       = w.goal       || '';
            importedData[`week_${n}_content`]    = w.content    || '';
            importedData[`week_${n}_tools`]      = w.tools      || '';
            importedData[`week_${n}_assessment`] = w.assessment || '';
          });
        }
        // localStorage에 저장
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ data: importedData, savedAt: new Date().toISOString() }));
        data = importedData;
        // 현재 탭 재빌드 + 필드 복원
        const activeBtnIdx = [...document.querySelectorAll('.tab-btn')].findIndex(b => b.classList.contains('active'));
        const idx = activeBtnIdx >= 0 ? activeBtnIdx : 0;
        const activeBtn = document.querySelectorAll('.tab-btn')[idx];
        showTab(idx, activeBtn);
        renderPreview();
        toast(`✅ "${file.name}" 불러오기 완료!`, 'success', 3000);
      } catch(err) {
        console.error('JSON import error:', err);
        toast('❌ JSON 파싱 오류: ' + err.message, 'error', 4000);
      }
    };
    reader.readAsText(file, 'utf-8');
  }

  return {
    init, showTab, toggleAccordion, updateRateTotal,
    saveNow, resetAll,
    toggleExportMenu, exportPDF, exportHTML, exportDOCX,
    exportJSON, importJSON, _onJsonFileSelected,
    _addItem, _addNestedStep, _addNestedSupport, _onChange
  }; // buildTab6 registered via TABS array
})();

// ── Boot ──
document.addEventListener('DOMContentLoaded', () => App.init());
</script>
